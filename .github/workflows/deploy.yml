name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

  Deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/apps/go-scheduler
            cd ~/apps/go-scheduler

            if [ ! -d ".git" ]; then
              git clone git@github.com:vickyvaf/go-scheduler.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            echo "PORT=8080" > .env
            echo "RESEND_CLIENT=${{ secrets.RESEND_CLIENT }}" >> .env
            echo "RESEND_FROM='${{ secrets.RESEND_FROM }}'" >> .env

            # Build and run using Docker-compose
            docker-compose up --build -d

            # Clean up old images to save space
            docker image prune -f
